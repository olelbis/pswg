name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install nFPM
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build release artifacts
        run: make release VERSION="${GITHUB_REF_NAME}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/pswg_${{ github.ref_name }}_sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Refresh checksums
        run: make checksums

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-checksums: dist/SHA256SUMS

      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-checksums: dist/SHA256SUMS
          sbom-path: dist/pswg_${{ github.ref_name }}_sbom.spdx.json

      - name: Attest checksums
        uses: actions/attest@v4
        with:
          subject-path: dist/SHA256SUMS

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes "See CHANGELOG.md for the curated release history and SECURITY.md for verification guidance."
