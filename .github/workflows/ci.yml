name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Format check
        run: test -z "$(gofmt -l pswg.go pswg_test.go genutil/genutil.go genutil/genutil_test.go genutil/example_test.go)"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Vulnerability check
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Link check
        run: python3 tools/check-links.py

      - name: Build
        run: CGO_ENABLED=0 go build -trimpath ./...
